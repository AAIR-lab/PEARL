--domain: goal
--partitioning: "uniform"
--epsilon_min: 0.05
--alpha: 0.05
--gamma: 0.99
--lamda: 0.0
--episode_max: 5000
--step_max: 150
--decay: 0.9989
--bootstrap: 'from_estimated_concrete'
--init_action_abs_level: 3
--init_state_abs_level: 1
--k_cap: 10
--k_cap_actions: 10
--allowed_diff_to_refine: 0.001
--abs_interval: 100
--eval_episodes: 100
--maximum_state_variables_to_split: 2
--max_clusters: 4
--min_samples: 20
--kernel: "linear"
--map_name: "goal"
# --interactive: False
# --plot_abstractions: False

 # td-error to v
--init_beta: 1.0
--decay_beta_amount: 0.02 #becomes 0 in 5000 episodes
# --decay_beta_amount: 0.05 #becomes 0 in 2000 episodes
# --decay_beta_amount: 0.01 #becomes 0 in 10,000 episodes
--min_beta: 0.15

