--domain: logistics
--partitioning: "flexible"
--epsilon_min: 0.05
--alpha: 0.05
--gamma: 0.99
--lamda: 0.1
--episode_max: 3000
--step_max: 400
--decay: 0.9989
--bootstrap: 'from_estimated_concrete'
--init_action_abs_level: 0
--init_state_abs_level: 1
--k_cap: 10
--k_cap_actions: 10
--allowed_diff_to_refine: 0.001
--abs_interval: 100
--eval_episodes: 100
--maximum_state_variables_to_split: None
--max_clusters: 8
--min_samples: 2
--kernel: "linear"
--map_name: "logistics"
# --interactive: False
# --plot_abstractions: False
--start_pos: "(0.2, 0.7)"
--agent_city: "0"
--package_pos: "(0.2, 0.7)"
--package_city: "1"
--target_pos: "(0.2, 0.7)"
--target_city: "2"
--airport_city1: "[(0.35, 0.7), (0.9, 0.35), (0.9,0.7)]"
--airport_city2: "[(0.2,0.25), (0.5,0.7), (0.7,0.25)]"
--airport_city3: "[(0.4, 0.7), (0.7, 0.35), (0.75,0.7)]"



 # td-error to v
--init_beta: 1.0
--decay_beta_amount: 0.02 #becomes 0 in 5000 episodes
# --decay_beta_amount: 0.05 #becomes 0 in 2000 episodes
# --decay_beta_amount: 0.01 #becomes 0 in 10,000 episodes
--min_beta: 0.15

